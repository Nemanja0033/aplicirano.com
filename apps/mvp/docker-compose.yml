version: "3.9"

services:
  db:
    image: postgres:16
    container_name: jobtracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    container_name: jobtracker_app
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    depends_on:
      - db
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      # Connect to the 'db' service defined above
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/jobtracker?schema=public"
      DATABASE_URL_UNPOOLED: "postgresql://postgres:postgres@db:5432/jobtracker?schema=public"
      # Other env vars from .env will be loaded automatically if present, or can be overridden here
      NEXTAUTH_URL: "http://localhost:3000"
      # Ensure host is 0.0.0.0 for docker
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
